name = "affiliatetrack"
main = "src/worker.ts"
compatibility_date = "2024-01-01"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "affiliatetrack-db"
database_id = "placeholder-will-be-updated"

# Durable Objects 绑定
[[durable_objects.bindings]]
name = "SESSION_MANAGER"
class_name = "SessionManager"

[[durable_objects.bindings]]
name = "STATS_AGGREGATOR"
class_name = "StatsAggregator"

[[durable_objects.bindings]]
name = "TRAFFIC_ROUTER"
class_name = "TrafficRouter"

# Durable Objects 迁移
[[migrations]]
tag = "v1"
new_classes = ["SessionManager", "StatsAggregator", "TrafficRouter"]

# 环境变量
[vars]
ENVIRONMENT = "development"
API_VERSION = "v1"
LOG_LEVEL = "debug"

# 生产环境配置
[env.production]
vars = { ENVIRONMENT = "production", LOG_LEVEL = "info" }

# 预发布环境配置
[env.staging]
vars = { ENVIRONMENT = "staging", LOG_LEVEL = "debug" }

# 静态资源服务 (管理后台)
[site]
bucket = "./frontend/dist"

# 开发服务器配置
[dev]
port = 8787
local_protocol = "http"
