name = "deploy"
# 部署工作流配置

# ==========================================
# 部署说明
# ==========================================
# 
# 1. 安装 Wrangler CLI:
#    npm install -g wrangler
#
# 2. 登录 Cloudflare:
#    wrangler login
#
# 3. 创建 D1 数据库:
#    wrangler d1 create affiliatetrack-db
#    复制返回的 database_id 到 wrangler.toml
#
# 4. 初始化数据库:
#    wrangler d1 execute affiliatetrack-db --file=./scripts/schema.sql
#
# 5. 设置密钥:
#    wrangler secret put JWT_SECRET
#
# 6. 部署:
#    npm run deploy:production
#
# ==========================================

# 部署前检查
[build]
command = "npm run build"

[build.upload]
format = "modules"
main = "./dist/worker.js"

# 部署配置
[vars]
ENVIRONMENT = "production"
LOG_LEVEL = "info"

# 密钥配置 (通过 wrangler secret 设置)
# JWT_SECRET = "your-secret-key"
